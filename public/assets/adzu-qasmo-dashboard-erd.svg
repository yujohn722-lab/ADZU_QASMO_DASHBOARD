    <text x="150" y="30" text-anchor="middle" class="label">report_reviews</text>
    <text x="22" y="74" class="pk">PK</text><text x="58" y="74" class="field">id</text>
    <text x="22" y="104" class="field">module_key / module_label</text>
    <text x="22" y="134" class="field">reportable_type / reportable_id</text>
    <text x="22" y="164" class="fk">FK</text><text x="58" y="164" class="field">respondent_id</text>
    <text x="22" y="194" class="field">status</text><text x="96" y="194" class="tiny-muted">pending/approved/revision</text>
    <text x="22" y="224" class="fk">FK</text><text x="58" y="224" class="field">reviewed_by</text>
  </g>

  <g class="shadow" transform="translate(1126 126)">
    <rect width="286" height="220" rx="8" class="card"/>
    <rect width="286" height="46" rx="8" class="head3"/>
    <text x="143" y="30" text-anchor="middle" class="label">report_notifications</text>
    <text x="22" y="74" class="pk">PK</text><text x="58" y="74" class="field">id</text>
    <text x="22" y="104" class="fk">FK</text><text x="58" y="104" class="field">user_id</text>
    <text x="22" y="134" class="fk">FK</text><text x="58" y="134" class="field">report_review_id</text>
    <text x="22" y="164" class="field">type / message</text>
    <text x="22" y="194" class="field">read_at / timestamps</text>
  </g>

  <g class="shadow" transform="translate(1480 118)">
    <rect width="284" height="348" rx="8" class="card"/>
    <rect width="284" height="46" rx="8" class="head"/>
    <text x="142" y="30" text-anchor="middle" class="label">Report Workflow</text>
    <rect x="26" y="74" width="232" height="50" rx="6" fill="#eef7fb" stroke="#b5dce8"/>
    <text x="52" y="105" class="small" font-weight="800">1. Respondent drafts</text>
    <rect x="26" y="146" width="232" height="50" rx="6" fill="#fff8e3" stroke="#efd27a"/>
    <text x="52" y="177" class="small" font-weight="800">2. Submits report</text>
    <rect x="26" y="218" width="232" height="50" rx="6" fill="#edf3ff" stroke="#b9cdf4"/>
    <text x="52" y="249" class="small" font-weight="800">3. Admin reviews</text>
    <rect x="26" y="290" width="108" height="40" rx="6" fill="#eaf8ee" stroke="#9ed9ad"/>
    <text x="80" y="315" text-anchor="middle" class="tiny">Approve</text>
    <rect x="150" y="290" width="108" height="40" rx="6" fill="#fff0f0" stroke="#e6b0b0"/>
    <text x="204" y="315" text-anchor="middle" class="tiny">Return</text>
    <path d="M142 124v22M142 196v22M142 268v22M204 330v18c0 14-12 24-26 24H72c-14 0-26-10-26-24V124" class="dash" marker-end="url(#arrow)"/>
  </g>

