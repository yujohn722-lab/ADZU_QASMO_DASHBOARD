<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120" role="img" aria-labelledby="title desc">
  <title id="title">ADZU QASMO Energy Crisis Learning Continuity Dashboard ERD</title>
  <desc id="desc">Project-specific entity relationship and workflow diagram for the ADZU QASMO dashboard.</desc>
  <defs>
    <style>
      .bg{fill:#f5f8fb}.ink{fill:#223438}.muted{fill:#637783}.blue{fill:#073f8f}.cyan{fill:#19bceb}.gold{fill:#ffc107}
      .card{fill:#fff;stroke:#d7dde4;stroke-width:2}.shadow{filter:url(#shadow)}
      .head{fill:#073f8f}.head2{fill:#223438}.head3{fill:#19bceb}.head4{fill:#ffc107}
      .label{font:700 18px "Segoe UI",Arial,sans-serif;fill:#fff}.title{font:800 28px "Segoe UI",Arial,sans-serif;fill:#073f8f}
      .subtitle{font:600 18px "Segoe UI",Arial,sans-serif;fill:#223438}.small{font:500 15px "Segoe UI",Arial,sans-serif;fill:#223438}
      .tiny{font:500 13px "Segoe UI",Arial,sans-serif;fill:#223438}.tiny-muted{font:500 13px "Segoe UI",Arial,sans-serif;fill:#637783}
      .field{font:500 14px "Segoe UI",Arial,sans-serif;fill:#223438}.pk{font:800 13px "Segoe UI",Arial,sans-serif;fill:#073f8f}.fk{font:800 13px "Segoe UI",Arial,sans-serif;fill:#0b7f95}
      .line{stroke:#65727c;stroke-width:2;fill:none}.dash{stroke:#65727c;stroke-width:2;stroke-dasharray:7 7;fill:none}
      .moduleHead{font:800 17px "Segoe UI",Arial,sans-serif;fill:#073f8f}.moduleText{font:600 13px "Segoe UI",Arial,sans-serif;fill:#223438}
      .pillText{font:800 14px "Segoe UI",Arial,sans-serif;fill:#fff}.white{fill:#fff}
    </style>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0a2030" flood-opacity=".10"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#65727c"/>
    </marker>
    <marker id="crow" markerWidth="18" markerHeight="18" refX="16" refY="9" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L16,9 L2,16 M16,9 L2,9" stroke="#65727c" stroke-width="2" fill="none"/>
    </marker>
  </defs>

  <rect class="bg" width="1800" height="1120"/>
  <path d="M0 0h1800v86H0z" fill="#fff"/>
  <path d="M0 86h1800" stroke="#d7dde4" stroke-width="2"/>

  <g transform="translate(36 18)">
    <circle cx="36" cy="36" r="34" fill="#073f8f"/>
    <circle cx="36" cy="36" r="26" fill="#fff"/>
    <path d="M36 11l7 17 18 2-14 12 4 18-15-9-15 9 4-18-14-12 18-2z" fill="#ffc107"/>
    <circle cx="36" cy="36" r="12" fill="#073f8f"/>
    <text x="36" y="41" text-anchor="middle" font-family="Segoe UI,Arial" font-size="11" font-weight="800" fill="#fff">ADZU</text>
  </g>
  <text x="92" y="35" class="title">ADZU QASMO Energy Crisis Learning Continuity Dashboard</text>
  <text x="92" y="62" class="subtitle">Entity Relationship Diagram and Report Review Workflow</text>
  <text x="1690" y="35" text-anchor="end" class="tiny-muted">Laravel Blade + MySQL</text>
  <text x="1690" y="60" text-anchor="end" class="tiny-muted">Prepared for QASMO</text>

  <g class="shadow">
    <rect x="36" y="118" width="312" height="306" rx="8" class="card"/>
    <rect x="36" y="118" width="312" height="46" rx="8" fill="#073f8f"/>
    <text x="58" y="148" class="label">System Overview</text>
    <text x="58" y="194" class="small">Monthly institutional reporting for energy</text>
    <text x="58" y="218" class="small">continuity, savings, service volume, and</text>
    <text x="58" y="242" class="small">fuel monitoring.</text>
    <text x="58" y="286" class="small">Admin users review submitted records,</text>
    <text x="58" y="310" class="small">send revision notes, approve reports,</text>
    <text x="58" y="334" class="small">and export dashboard summaries.</text>
    <text x="58" y="382" class="tiny-muted">Source tables shown below match current</text>
    <text x="58" y="402" class="tiny-muted">migrations in this project.</text>

    <rect x="36" y="452" width="312" height="214" rx="8" class="card"/>
    <rect x="36" y="452" width="312" height="46" rx="8" fill="#223438"/>
    <text x="58" y="482" class="label">Core Roles</text>
    <circle cx="72" cy="535" r="18" fill="#073f8f"/>
    <text x="104" y="540" class="small" font-weight="800">Admin</text>
    <text x="58" y="574" class="tiny">Reviews all module reports</text>
    <text x="58" y="596" class="tiny">Approves or returns records</text>
    <text x="58" y="618" class="tiny">Exports reports and views charts</text>
    <circle cx="72" cy="641" r="18" fill="#0a7d24"/>
    <text x="104" y="646" class="small" font-weight="800">Respondent</text>

    <rect x="36" y="696" width="312" height="224" rx="8" class="card"/>
    <rect x="36" y="696" width="312" height="46" rx="8" fill="#ffc107"/>
    <text x="58" y="726" class="label" fill="#223438">Legend</text>
    <text x="58" y="780" class="pk">PK</text><text x="98" y="780" class="tiny">Primary key</text>
    <text x="58" y="812" class="fk">FK</text><text x="98" y="812" class="tiny">Foreign key</text>
    <line x1="58" y1="848" x2="142" y2="848" class="line" marker-end="url(#crow)"/>
    <text x="160" y="853" class="tiny">One user owns many records</text>
    <line x1="58" y1="884" x2="142" y2="884" class="dash" marker-end="url(#arrow)"/>
    <text x="160" y="889" class="tiny">Workflow action</text>
  </g>

  <g class="shadow" transform="translate(420 126)">
    <rect width="250" height="244" rx="8" class="card"/>
    <rect width="250" height="46" rx="8" class="head"/>
    <text x="125" y="30" text-anchor="middle" class="label">users</text>
    <text x="22" y="74" class="pk">PK</text><text x="58" y="74" class="field">id</text>
    <text x="22" y="104" class="field">name</text>
    <text x="22" y="134" class="field">email</text><text x="134" y="134" class="tiny-muted">unique</text>
    <text x="22" y="164" class="field">password</text>
    <text x="22" y="194" class="field">role</text><text x="86" y="194" class="tiny-muted">admin/respondent</text>
    <text x="22" y="224" class="field">created_at / updated_at</text>
  </g>

  <g class="shadow" transform="translate(748 126)">
